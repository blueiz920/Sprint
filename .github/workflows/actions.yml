# .github/workflows/actions.yml

# 이름 짓기
name: Github Actions 연습하기
# 언제 이 작업을 실행할지 정의
# push: github에 push할 때마다 실행
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5

      - name: Node.js 설치
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 의존성 설치
        # npm install - package-lock.json 을 새로 만들어 주는 놈
        # npm ci - package-lock.json 을 바탕으로 설치하는 놈
        # package-lock.json이 없으면 npm ci는 실행되지 않음
        run: npm ci

      - name: 테스트 실행
        run: npm run test
