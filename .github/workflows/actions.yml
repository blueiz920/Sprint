# .github/workflows/actions.yml

# 이름 짓기
name: Github Actions 연습하기
# 언제 이 작업을 실행할지 정의
# push: github에 push할 때마다 실행
on: push

jobs:
  push-job:
    runs-on: ubuntu-latest
    # 일의 순서
    steps:
      - name: 첫 번째 작업
        run: echo "첫 번째 작업 실행 중" # echo : console.log()유사

      - name: 두 번째 작업 - 여러 문장 작성하기
        run: |
          echo "두 번째 작업 - 첫 번째 명령어"
          echo "두 번째 작업 - 두 번째 명령어"

      - name: GA 자체 변수들
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY

      - name: GA secret 변수
        run: |
          echo ${{ secrets.CHROMATIC_PROJECT_TOKEN}}
